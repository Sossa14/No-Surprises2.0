<!DOCTYPE html>
<html>
<head>
  <title>Enter Password</title>

  <style>
    body {
      margin: 0;
      height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      background: linear-gradient(135deg, #f1fc5a, #cafc56);
      font-family: Arial, sans-serif;
    }

    .box {
      background: white;
      padding: 30px;
      border-radius: 12px;
      box-shadow: 0 10px 25px rgba(0,0,0,0.2);
      text-align: center;
      width: 300px;
    }

    input {
      width: 100%;
      padding: 10px;
      margin-top: 10px;
      border-radius: 6px;
      border: 1px solid #ccc;
      font-size: 16px;
    }

    button {
      margin-top: 15px;
      width: 100%;
      padding: 10px;
      border: none;
      border-radius: 6px;
      background: #4facfe;
      color: white;
      font-size: 16px;
      cursor: pointer;
    }

    button:hover {
      background: #bae446;
    }

    .error {
      color: red;
      margin-top: 10px;
    }

    #content {
      display: none;
      text-align: center;
      color: white;
    }
  </style>
</head>

<body>

  <!-- Login Box -->
  <div class="box" id="loginBox">
    <h2>🔐 Enter Password</h2>
    <input type="password" id="password" placeholder="Password">
    <button onclick="checkPassword()">Enter</button>
    <p class="error" id="error"></p>
  </div>

  <!-- Hidden Content -->
  <div id="content">
    <h1>Welcome 🎉</h1>
    <p>You unlocked the page!</p>
  </div>

<script>
  const correctPassword = "1414"; 
  const redirectPage = "home.html"; 

  function checkPassword() {
    const input = document.getElementById("password").value;

    if (input === correctPassword) {
      window.location.href = redirectPage;
        } else {
      document.getElementById("error").innerText = "Incorrect password!";
    }
  }

  // Allow Enter key
  document.getElementById("password").addEventListener("keypress", function(e) {
    if (e.key === "Enter") {
      checkPassword();
    }
  });
</script>

</body>
</html>
